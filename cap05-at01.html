<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de Contado - Cap 05 / Ativ. 1</title>
</head>

<body>
    <header>
        <h1>Formulário de Contato</h1>
    </header>

    <main>
        <form action="https://httpbin.org/get" method="get">

            <p>
                <label for="nome">
                    Nome completo
                </label>

                <input
                    type="text"
                    id="nome"
                    name="nome">
            </p>

            <p>
                <label for="email">
                    E-mail
                </label>

                <input
                    type="email"
                    id="email"
                    name="email">
            </p>

            <p>
                <label for="assunto">
                    Assunto
                </label>

                <input
                    type="text"
                    id="assunto"
                    name="assunto">
            </p>

            <p>
                <label for="mensagem">
                    Mensagem
                </label>

                <textarea
                    id="mensagem"
                    name="mensagem"
                    rows="5">
                </textarea>
            </p>

            <button type="submit">
                Enviar
            </button>
        </form>

    </main>
    
    <footer>
        <p><a href="index.html">Clique para voltar</a>
        </p>
    </footer>
</body>

</html>
